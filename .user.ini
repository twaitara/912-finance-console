; Session cookie hardening (PHP-FPM / CGI reads this per-directory).
; The site is served over HTTPS, so Secure is safe to enable.
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.cookie_secure = 1
session.use_strict_mode = 1

; Never render PHP warnings/errors into the response; log them server-side instead.
display_errors = 0
log_errors = 1
