deployment:
  tasks:
    - export DEPLOYPATH=/home4/tonyketter/nineonetwo.online/WORKINGCAPITAL
    # Lint gate: syntax-check every PHP file in the clone BEFORE copying. A parse
    # error aborts the deploy (non-zero exit) so a broken file can't take the live
    # site down. Resilient: if no php binary is found, it warns and skips (never
    # bricks a deploy over a missing interpreter).
    - PHPBIN="$(command -v php || ls /opt/cpanel/ea-php*/root/usr/bin/php 2>/dev/null | sort -r | head -1)"; if [ -n "$PHPBIN" ]; then echo "Linting PHP with $PHPBIN"; find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -r -n1 "$PHPBIN" -l 1>/dev/null || { echo ">>> PHP LINT FAILED — aborting deploy (live site untouched)"; exit 1; }; echo "PHP lint OK"; else echo "WARN: no php binary found; skipping lint gate"; fi
    # Copy ALL root-level PHP files so new files deploy automatically.
    # config.php / mail_token.php are gitignored, so they're not in the clone
    # and can never overwrite the live secrets in $DEPLOYPATH.
    - /bin/cp *.php $DEPLOYPATH
    - /bin/cp .user.ini $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
    # Static app bundle extracted from index.php (cache-busted via ?v=filemtime)
    - /bin/cp app.css $DEPLOYPATH
    - /bin/cp app.js $DEPLOYPATH
    - /bin/cp -R api $DEPLOYPATH
    # Security hardening: deny direct web access to the data/ cache (Zoho token + JSON)
    - /bin/cp data/.htaccess $DEPLOYPATH/data/
