deployment:
  tasks:
    - export DEPLOYPATH=/home4/tonyketter/nineonetwo.online/WORKINGCAPITAL
    # Copy ALL root-level PHP files so new files deploy automatically.
    # config.php / mail_token.php are gitignored, so they're not in the clone
    # and can never overwrite the live secrets in $DEPLOYPATH.
    - /bin/cp *.php $DEPLOYPATH
    - /bin/cp .user.ini $DEPLOYPATH
    - /bin/cp .htaccess $DEPLOYPATH
    # Static app bundle extracted from index.php (cache-busted via ?v=filemtime)
    - /bin/cp app.css $DEPLOYPATH
    - /bin/cp app.js $DEPLOYPATH
    - /bin/cp -R api $DEPLOYPATH
    # Security hardening: deny direct web access to the data/ cache (Zoho token + JSON)
    - /bin/cp data/.htaccess $DEPLOYPATH/data/
